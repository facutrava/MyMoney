<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mis Gastos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1A1814;
  --text2: #6B6760;
  --text3: #9E9B96;
  --accent: #2D5A3D;
  --accent-light: #EAF2EC;
  --accent2: #C4502A;
  --accent2-light: #FBF0EC;
  --amber: #B87333;
  --amber-light: #FDF6ED;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

h1, h2, h3 { font-family: 'DM Serif Display', serif; font-weight: 400; }

.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
}

.app-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text);
}

.month-select {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  padding: 6px 10px;
  cursor: pointer;
  outline: none;
}

.main { max-width: 800px; margin: 0 auto; padding: 1.5rem; }

.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }

.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  box-shadow: var(--shadow);
}

.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.metric-val { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
.metric-val.ok { color: var(--accent); }
.metric-val.warn { color: var(--amber); }
.metric-val.over { color: var(--accent2); }

.tabs {
  display: flex;
  gap: 2px;
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 3px;
  margin-bottom: 1.5rem;
}

.tab {
  flex: 1;
  padding: 8px 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  background: none;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.section { display: none; }
.section.active { display: block; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
}

.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  margin-bottom: 1rem;
  color: var(--text);
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); }

input, select, textarea {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s;
}

input:focus, select:focus, textarea:focus { border-color: var(--accent); background: var(--surface); }
textarea { resize: vertical; min-height: 56px; }

.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  width: 100%;
  margin-top: 4px;
}

.btn-primary:hover { background: #234d33; }

.btn-ghost {
  background: none;
  color: var(--text3);
  padding: 4px 6px;
  font-size: 13px;
}

.btn-ghost:hover { color: var(--accent2); }

.expense-list { }

.day-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 10px 0 6px;
}

.expense-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.expense-row:last-child { border-bottom: none; }

.exp-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.exp-body { flex: 1; min-width: 0; }
.exp-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exp-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.exp-note { font-size: 12px; color: var(--text3); font-style: italic; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

.exp-right { text-align: right; flex-shrink: 0; }
.exp-amount { font-family: 'DM Serif Display', serif; font-size: 16px; }
.exp-cur { font-size: 11px; color: var(--text3); }

.filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
.filter-bar select { font-size: 13px; }

.view-toggle { display: flex; gap: 4px; flex-shrink: 0; }
.vtbtn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: none;
  color: var(--text2);
  cursor: pointer;
}
.vtbtn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

.budget-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.budget-row:last-child { border-bottom: none; }
.budget-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.budget-info { flex: 1; min-width: 0; }
.budget-name { font-size: 14px; font-weight: 500; }
.budget-track { height: 3px; background: var(--surface2); border-radius: 4px; margin-top: 6px; overflow: hidden; }
.budget-fill { height: 3px; border-radius: 4px; transition: width 0.4s; }
.budget-nums { font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; min-width: 100px; }

.budget-input-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.budget-input-row:last-child { border-bottom: none; }
.budget-input-row input { width: 130px; text-align: right; }

.empty { text-align: center; padding: 2.5rem 1rem; color: var(--text3); font-size: 14px; }

.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; font-size: 12px; color: var(--text2); }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

.badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 500;
}

@media (max-width: 600px) {
  .metrics { grid-template-columns: 1fr 1fr; }
  .metrics .metric-card:last-child { grid-column: span 2; }
  .form-grid { grid-template-columns: 1fr; }
  .metric-val { font-size: 18px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <h1 class="app-title">Mis gastos</h1>
    <select class="month-select" id="month-filter"></select>
  </div>
</header>

<main class="main">
  <div class="metrics">
    <div class="metric-card">
      <div class="metric-label">Gastado ARS</div>
      <div class="metric-val" id="m-ars">$0</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Gastado USD</div>
      <div class="metric-val" id="m-usd">U$D 0</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Presupuesto</div>
      <div class="metric-val" id="m-budget">—</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('nuevo')">＋ Nuevo</button>
    <button class="tab" onclick="showTab('historial')">Historial</button>
    <button class="tab" onclick="showTab('graficos')">Gráficos</button>
    <button class="tab" onclick="showTab('presupuesto')">Presupuesto</button>
  </div>

  <!-- NUEVO -->
  <div class="section active" id="tab-nuevo">
    <div class="card">
      <h2 class="card-title">Registrar gasto</h2>
      <div class="form-grid">
        <div class="form-group" style="grid-column:span 2;">
          <label class="form-label">Descripción</label>
          <input type="text" id="f-desc" placeholder="Ej: Supermercado, almuerzo..." />
        </div>
        <div class="form-group">
          <label class="form-label">Monto</label>
          <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label class="form-label">Moneda</label>
          <select id="f-currency">
            <option value="ARS">ARS – Pesos</option>
            <option value="USD">USD – Dólares</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select id="f-category">
            <option value="Comida">🍔 Comida</option>
            <option value="Transporte">🚗 Transporte</option>
            <option value="Salud">💊 Salud</option>
            <option value="Entretenimiento">🎬 Entretenimiento</option>
            <option value="Hogar">🏠 Hogar</option>
            <option value="Ropa">👗 Ropa</option>
            <option value="Educación">📚 Educación</option>
            <option value="Servicios">💡 Servicios</option>
            <option value="Otros">📦 Otros</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group" style="grid-column:span 2;">
          <label class="form-label">Nota (opcional)</label>
          <input type="text" id="f-note" placeholder="Ej: Almuerzo con trabajo" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="addExpense()">Registrar gasto</button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="section" id="tab-historial">
    <div class="filter-bar">
      <select id="hf-currency" onchange="renderHistory()" style="font-size:13px;">
        <option value="all">Todas las monedas</option>
        <option value="ARS">ARS</option>
        <option value="USD">USD</option>
      </select>
      <select id="hf-cat" onchange="renderHistory()" style="font-size:13px;">
        <option value="all">Todas las categorías</option>
        <option value="Comida">Comida</option>
        <option value="Transporte">Transporte</option>
        <option value="Salud">Salud</option>
        <option value="Entretenimiento">Entretenimiento</option>
        <option value="Hogar">Hogar</option>
        <option value="Ropa">Ropa</option>
        <option value="Educación">Educación</option>
        <option value="Servicios">Servicios</option>
        <option value="Otros">Otros</option>
      </select>
      <div class="view-toggle">
        <button class="vtbtn active" id="vb-day" onclick="setView('day')">Día</button>
        <button class="vtbtn" id="vb-month" onclick="setView('month')">Mes</button>
      </div>
    </div>
    <div class="card" id="history-container"><div class="empty">Sin gastos registrados</div></div>
  </div>

  <!-- GRAFICOS -->
  <div class="section" id="tab-graficos">
    <div class="card" style="margin-bottom:1rem;">
      <h2 class="card-title">Por categoría <span style="font-family:'DM Sans';font-size:12px;color:var(--text3);font-weight:400;">(ARS)</span></h2>
      <div style="position:relative;width:100%;height:260px;">
        <canvas id="chart-cat" role="img" aria-label="Gastos por categoría en ARS">Distribución de gastos por categoría.</canvas>
      </div>
      <div class="legend" id="cat-legend"></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <h2 class="card-title" style="margin:0;">Tendencia mensual</h2>
        <select id="trend-cur" onchange="renderCharts()" style="font-size:12px;width:auto;padding:5px 8px;">
          <option value="ARS">ARS</option>
          <option value="USD">USD</option>
        </select>
      </div>
      <div style="position:relative;width:100%;height:220px;">
        <canvas id="chart-trend" role="img" aria-label="Tendencia mensual de gastos">Evolución mensual de gastos.</canvas>
      </div>
    </div>
  </div>

  <!-- PRESUPUESTO -->
  <div class="section" id="tab-presupuesto">
    <div class="card" style="margin-bottom:1rem;">
      <h2 class="card-title">Presupuestos mensuales <span style="font-family:'DM Sans';font-size:12px;color:var(--text3);font-weight:400;">(ARS)</span></h2>
      <div id="budget-inputs"></div>
      <button class="btn btn-primary" style="margin-top:14px;" onclick="saveBudgets()">Guardar</button>
    </div>
    <div class="card">
      <h2 class="card-title">Estado del mes</h2>
      <div id="budget-status"><div class="empty">Configurá presupuestos arriba</div></div>
    </div>
  </div>
</main>

<script>
const CATS = ['Comida','Transporte','Salud','Entretenimiento','Hogar','Ropa','Educación','Servicios','Otros'];
const ICONS = {Comida:'🍔',Transporte:'🚗',Salud:'💊',Entretenimiento:'🎬',Hogar:'🏠',Ropa:'👗',Educación:'📚',Servicios:'💡',Otros:'📦'};
const COLORS = ['#2D5A3D','#C4502A','#B87333','#4A7FA5','#7A5C9E','#5C8E6B','#C4843A','#3A6B8E','#8E6B3A'];
const IBGS = ['#EAF2EC','#FBF0EC','#FDF6ED','#EAF2F8','#F2EAF8','#EAF4EE','#FEF3E8','#EAF3F8','#F8F3EA'];

let expenses = JSON.parse(localStorage.getItem('mg_expenses') || '[]');
let budgets = JSON.parse(localStorage.getItem('mg_budgets') || '{}');
let view = 'day';
let catChart = null, trendChart = null;

function save() {
  localStorage.setItem('mg_expenses', JSON.stringify(expenses));
  localStorage.setItem('mg_budgets', JSON.stringify(budgets));
}

function monthKey(d) { return d.slice(0,7); }
function monthLabel(k) {
  const [y,m] = k.split('-');
  return ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][parseInt(m)-1]+' '+y;
}
function selectedMonth() { return document.getElementById('month-filter').value; }
function monthExp() { return expenses.filter(e=>monthKey(e.date)===selectedMonth()); }

function fmt(n, cur) {
  if (cur==='ARS') return '$'+Math.round(n).toLocaleString('es-AR');
  return 'U$D '+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function initMonthFilter() {
  const sel = document.getElementById('month-filter');
  const cur = new Date().toISOString().slice(0,7);
  const keys = new Set(expenses.map(e=>monthKey(e.date)));
  keys.add(cur);
  const sorted = [...keys].sort().reverse();
  sel.innerHTML = sorted.map(k=>`<option value="${k}">${monthLabel(k)}</option>`).join('');
  if (!sel.value) sel.value = cur;
  sel.onchange = updateAll;
}

function updateMetrics() {
  const mes = monthExp();
  const ars = mes.filter(e=>e.currency==='ARS').reduce((s,e)=>s+e.amount,0);
  const usd = mes.filter(e=>e.currency==='USD').reduce((s,e)=>s+e.amount,0);
  document.getElementById('m-ars').textContent = fmt(ars,'ARS');
  document.getElementById('m-usd').textContent = fmt(usd,'USD');
  const bCats = Object.keys(budgets).filter(c=>budgets[c]>0);
  const el = document.getElementById('m-budget');
  if (!bCats.length) { el.textContent='—'; el.className='metric-val'; return; }
  const totalB = bCats.reduce((s,c)=>s+(budgets[c]||0),0);
  const spent = mes.filter(e=>e.currency==='ARS').reduce((s,e)=>s+e.amount,0);
  const pct = totalB>0?Math.round(spent/totalB*100):0;
  el.textContent = pct+'%';
  el.className = 'metric-val '+(pct>100?'over':pct>75?'warn':'ok');
}

function renderHistory() {
  const mes = monthExp();
  const cf = document.getElementById('hf-currency').value;
  const catf = document.getElementById('hf-cat').value;
  let list = mes.filter(e=>(cf==='all'||e.currency===cf)&&(catf==='all'||e.category===catf));
  list.sort((a,b)=>b.date.localeCompare(a.date));
  const container = document.getElementById('history-container');
  if (!list.length) { container.innerHTML='<div class="empty">Sin gastos para este período</div>'; return; }

  let html = '';
  if (view==='day') {
    const byDay = {};
    list.forEach(e=>{ if(!byDay[e.date]) byDay[e.date]=[]; byDay[e.date].push(e); });
    Object.keys(byDay).sort().reverse().forEach(day=>{
      const d = new Date(day+'T12:00:00');
      html += `<div class="day-label">${d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>`;
      byDay[day].forEach(e=>{ html+=rowHTML(e); });
    });
  } else {
    const byCat = {};
    list.forEach(e=>{
      const k=e.currency+'|'+e.category;
      if(!byCat[k]) byCat[k]={cat:e.category,cur:e.currency,total:0,items:[]};
      byCat[k].total+=e.amount; byCat[k].items.push(e);
    });
    Object.values(byCat).sort((a,b)=>b.total-a.total).forEach(g=>{
      html+=`<div class="day-label">${ICONS[g.cat]} ${g.cat} — ${fmt(g.total,g.cur)}</div>`;
      g.items.forEach(e=>{ html+=rowHTML(e); });
    });
  }
  container.innerHTML = html;
}

function rowHTML(e) {
  const ci = CATS.indexOf(e.category);
  return `<div class="expense-row">
    <div class="exp-icon" style="background:${IBGS[ci]}">${ICONS[e.category]||'📦'}</div>
    <div class="exp-body">
      <div class="exp-name">${e.desc}</div>
      <div class="exp-sub">${e.category} · ${new Date(e.date+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div>
      ${e.note?`<div class="exp-note">${e.note}</div>`:''}
    </div>
    <div class="exp-right">
      <div class="exp-amount" style="color:${COLORS[ci]}">${fmt(e.amount,e.currency)}</div>
      <div class="exp-cur">${e.currency}</div>
      <button class="btn btn-ghost" onclick="delExpense('${e.id}')" title="Eliminar">✕</button>
    </div>
  </div>`;
}

function renderCharts() {
  const mes = monthExp();
  renderCatChart(mes);
  renderTrendChart();
}

function renderCatChart(mes) {
  const byCat = {};
  CATS.forEach(c=>byCat[c]=0);
  mes.filter(e=>e.currency==='ARS').forEach(e=>byCat[e.category]+=e.amount);
  const labels=[], data=[], colors=[];
  CATS.forEach((c,i)=>{ if(byCat[c]>0){labels.push(c);data.push(byCat[c]);colors.push(COLORS[i]);} });
  if (catChart) { catChart.destroy(); catChart=null; }
  const cv = document.getElementById('chart-cat');
  if (!data.length) { cv.parentElement.innerHTML='<div class="empty" style="padding:3rem">Sin gastos ARS este mes</div>'; return; }
  catChart = new Chart(cv, {
    type:'doughnut',
    data:{ labels, datasets:[{ data, backgroundColor:colors, borderWidth:0 }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+fmt(ctx.raw,'ARS')}} },
      cutout:'62%'
    }
  });
  const total = data.reduce((s,v)=>s+v,0);
  document.getElementById('cat-legend').innerHTML = labels.map((l,i)=>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l} ${Math.round(data[i]/total*100)}%</span>`
  ).join('');
}

function renderTrendChart() {
  const cur = document.getElementById('trend-cur').value;
  const byM = {};
  expenses.filter(e=>e.currency===cur).forEach(e=>{ const k=monthKey(e.date); byM[k]=(byM[k]||0)+e.amount; });
  const months = Object.keys(byM).sort().slice(-6);
  const data = months.map(m=>Math.round(byM[m]||0));
  const labels = months.map(m=>monthLabel(m).slice(0,3)+"'"+m.slice(2,4));
  if (trendChart) { trendChart.destroy(); trendChart=null; }
  const cv = document.getElementById('chart-trend');
  if (!data.length) { cv.parentElement.innerHTML='<div class="empty" style="padding:2rem">Sin datos suficientes</div>'; return; }
  trendChart = new Chart(cv, {
    type:'bar',
    data:{
      labels,
      datasets:[{ data, backgroundColor:'rgba(45,90,61,0.18)', borderColor:'#2D5A3D', borderWidth:1.5, borderRadius:5 }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{font:{size:11},color:'#9E9B96'}, grid:{display:false}, border:{display:false} },
        y:{ ticks:{font:{size:11},color:'#9E9B96',callback:v=>cur==='ARS'?'$'+v.toLocaleString():'U$D '+v}, grid:{color:'rgba(0,0,0,0.04)'}, border:{display:false} }
      }
    }
  });
}

function renderBudgets() {
  document.getElementById('budget-inputs').innerHTML = CATS.map(c=>`
    <div class="budget-input-row">
      <span style="font-size:20px;width:28px;text-align:center;">${ICONS[c]}</span>
      <span style="flex:1;font-size:14px;">${c}</span>
      <span style="font-size:13px;color:var(--text2);">$</span>
      <input type="number" id="bi-${c}" value="${budgets[c]||''}" placeholder="0" min="0" style="width:130px;text-align:right;" />
    </div>`).join('');

  const mes = monthExp().filter(e=>e.currency==='ARS');
  const spent={};
  CATS.forEach(c=>spent[c]=0);
  mes.forEach(e=>spent[e.category]+=e.amount);
  const bCats = CATS.filter(c=>budgets[c]>0);
  const el = document.getElementById('budget-status');
  if (!bCats.length) { el.innerHTML='<div class="empty">Configurá presupuestos arriba</div>'; return; }
  el.innerHTML = bCats.map(c=>{
    const s=spent[c]||0, b=budgets[c];
    const pct=Math.min(Math.round(s/b*100),100);
    const over=s>b;
    const color=over?'#C4502A':pct>75?'#B87333':'#2D5A3D';
    return `<div class="budget-row">
      <span class="budget-icon">${ICONS[c]}</span>
      <div class="budget-info">
        <div class="budget-name">${c}</div>
        <div class="budget-track"><div class="budget-fill" style="width:${pct}%;background:${color};"></div></div>
      </div>
      <div class="budget-nums">
        <div style="color:${color};font-weight:500;">${fmt(s,'ARS')}</div>
        <div style="color:var(--text3);">/ ${fmt(b,'ARS')}</div>
      </div>
    </div>`;
  }).join('');
}

function saveBudgets() {
  CATS.forEach(c=>{ const v=parseFloat(document.getElementById('bi-'+c)?.value||0); if(v>0) budgets[c]=v; else delete budgets[c]; });
  save(); updateAll(); alert('Presupuestos guardados ✓');
}

function addExpense() {
  const desc=document.getElementById('f-desc').value.trim();
  const amount=parseFloat(document.getElementById('f-amount').value);
  const currency=document.getElementById('f-currency').value;
  const category=document.getElementById('f-category').value;
  const date=document.getElementById('f-date').value;
  const note=document.getElementById('f-note').value.trim();
  if(!desc||!amount||!date||amount<=0){ alert('Completá descripción, monto y fecha'); return; }
  expenses.push({id:Date.now().toString(),desc,amount,currency,category,date,note});
  save();
  document.getElementById('f-desc').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-note').value='';
  initMonthFilter();
  updateAll();
  showTab('historial');
}

function delExpense(id) {
  if(!confirm('¿Eliminar este gasto?')) return;
  expenses=expenses.filter(e=>e.id!==id);
  save(); initMonthFilter(); updateAll();
}

function showTab(name) {
  const names=['nuevo','historial','graficos','presupuesto'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='graficos') renderCharts();
  if(name==='presupuesto') renderBudgets();
}

function setView(v) {
  view=v;
  document.getElementById('vb-day').classList.toggle('active',v==='day');
  document.getElementById('vb-month').classList.toggle('active',v==='month');
  renderHistory();
}

function updateAll() {
  updateMetrics(); renderHistory();
  const gt=document.getElementById('tab-graficos');
  const pt=document.getElementById('tab-presupuesto');
  if(gt.classList.contains('active')) renderCharts();
  if(pt.classList.contains('active')) renderBudgets();
}

document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
initMonthFilter();
updateAll();
</script>
</body>
</html>
